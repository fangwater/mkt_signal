<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>order_query</title>
    <script>
      (function () {
        var p = window.location.pathname || "/";
        if (!p.endsWith("/")) {
          window.location.replace(p + "/" + window.location.search + window.location.hash);
        }
      })();
    </script>
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div>
          <div class="title">order_query</div>
          <div class="subtitle">Export All → symbol 选择 → 导出最终 parquet</div>
        </div>
        <div class="status">
          <span class="pill" id="pillReady">EMPTY</span>
          <span class="pill" id="pillStatus">idle</span>
          <span class="muted" id="txtExportDir"></span>
        </div>
      </header>

      <section class="card">
        <div class="row">
          <button id="btnExportAll" class="btn primary">Export All</button>
          <span class="muted" id="txtApiBase"></span>
        </div>
        <div class="row">
          <div class="muted" id="txtExportInfo">未导出</div>
        </div>
      </section>

      <section class="card">
        <div class="row">
          <label class="label" for="symbolSearch">Symbol</label>
          <input id="symbolSearch" class="input" type="text" placeholder="搜索，比如 FIL / DOGE ..." />
          <select id="symbolSelect" class="select"></select>
          <button id="btnExportSymbol" class="btn primary">Export {symbol}_order.parquet</button>
        </div>
        <div class="row">
          <div class="muted" id="txtSymbolHint"></div>
        </div>
      </section>

      <footer class="footer muted">
        <span>Endpoints: /api/export_all /api/symbols /api/export_symbol /api/download_symbol</span>
      </footer>
    </div>

    <script src="assets/app.js"></script>
  </body>
</html>
