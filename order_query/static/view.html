<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>order_query viewer</title>
    <script>
      (function () {
        var p = window.location.pathname || "/";
        if (p.endsWith("/")) {
          window.location.replace(p.slice(0, -1) + window.location.search + window.location.hash);
        }
      })();
    </script>
    <link rel="stylesheet" href="assets/style.css" />
    <link rel="stylesheet" href="assets/view.css" />
    <script type="importmap">
      {
        "imports": {
          "apache-arrow": "https://cdn.jsdelivr.net/npm/apache-arrow@14.0.2/+esm"
        }
      }
    </script>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div>
          <div class="title">order_query viewer</div>
          <div class="subtitle" id="subtitle">DuckDB-WASM 读取 {symbol}_order.parquet，展示最新 100 行</div>
        </div>
        <div class="status">
          <span class="pill" id="pill">loading</span>
        </div>
      </header>

      <section class="card">
        <div class="row">
          <span class="muted" id="txtInfo"></span>
          <a class="btn" id="lnkDownload" href="#">Download Parquet</a>
          <button class="btn" id="btnReload">Reload</button>
        </div>
      </section>

      <section class="card">
        <div class="row">
          <div class="label">Latest 100</div>
          <div class="muted" id="txtHint"></div>
        </div>
        <div class="tableWrap">
          <table id="tbl" class="table"></table>
        </div>
      </section>
    </div>

    <script type="module" src="assets/view.js"></script>
  </body>
</html>
