      history_size: 100
      subscriber_max_buffer_size: 8192

  - id: bridge_gate_futures_derivatives
    from:
      type: ipc
      endpoint: "dat_pbs/gate-futures/derivatives"
      size: 128
    to:
      type: ipc
      endpoint: "bridge/gate-futures/derivatives"
      size: 128
      max_publishers: 1
      max_subscribers: 64
      history_size: 50
      subscriber_max_buffer_size: 8192
