      size: 128
      max_publishers: 1
      max_subscribers: 64
      history_size: 100
      subscriber_max_buffer_size: 8192

  - id: bridge_binance_futures_derivatives
    from:
      type: ipc
      endpoint: "dat_pbs/binance-futures/derivatives"
      size: 128
    to:
      type: ipc
      endpoint: "bridge/binance-futures/derivatives"
      size: 128
      max_publishers: 1
      max_subscribers: 64
      history_size: 50
      subscriber_max_buffer_size: 8192

  - id: bridge_gate_margin_ask_bid
    from:
      type: ipc
      endpoint: "dat_pbs/gate-margin/ask_bid_spread"
      size: 128
    to:
      type: ipc
      endpoint: "bridge/gate-margin/ask_bid_spread"
      size: 128
      max_publishers: 1
      max_subscribers: 64
      history_size: 100
      subscriber_max_buffer_size: 8192

  - id: bridge_gate_margin_derivatives
    from:
      type: ipc
      endpoint: "dat_pbs/gate-margin/derivatives"
      size: 128
    to:
      type: ipc
      endpoint: "bridge/gate-margin/derivatives"
      size: 128
      max_publishers: 1
