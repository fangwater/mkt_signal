# Bridge test: Node A (pretrade side)
# Publishes to order_reqs/binance -> forwards via ZMQ to Node B
# Receives order_resps/binance from Node B via ZMQ

self_id: node_a

nodes:
  - id: node_a
    addr: "tcp://0.0.0.0:15555"
  - id: node_b
    addr: "tcp://127.0.0.1:15556"

routes:
  # A -> B: order requests
  - id: order_req_test
    from:
      node: node_a
      service: "order_reqs/binance"
      size: 4096
    to:
      node: node_b
      service: "order_reqs/binance"
      size: 4096

  # B -> A: order responses
  - id: order_resp_test
    from:
      node: node_b
      service: "order_resps/binance"
      size: 4096
    to:
      node: node_a
      service: "order_resps/binance"
      size: 4096
