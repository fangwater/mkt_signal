# Client-side CSV capture config for the HK latency monitor.
# The start/stop scripts also read instance/pm2_* from this file.
instance = "hk"

# ZMQ source. endpoint takes precedence if set; otherwise endpoint is built as tcp://<ip>:<port>.
ip = "47.238.128.48"
port = 6370
# endpoint = "tcp://47.238.128.48:6370"
topic = "latency."
out_dir = "data/latency_csv/hk"
flush_every = 1
recv_timeout_ms = 1000
stats_secs = 30
limit = 0
include_spread_net = false
pm2_namespace = "latency_csv_capture"
pm2_name = "latency_csv_capture-hk"
rust_log = "info"
