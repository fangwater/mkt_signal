# Fusion factor 发布配置
fusion_factor_pub:
  data_source:
    trade_flow_channel: "trade_flow_feature"

  symbols:
    - "BTCUSDT"
    - "ETHUSDT"

  # 启动时按 symbol 拉取有序 factor 列表，并固化到进程内
  model_manager:
    base_url: "http://127.0.0.1:6300"
    model_name: "pairmm_xgb_v1"
    request_timeout_ms: 5000

  output:
    service_path: "fusion_factor/binance-futures/pairmm_xgb_v1"
