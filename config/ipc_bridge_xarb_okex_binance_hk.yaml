# XARB OKEX(open) - Binance(hedge) bridge config (HK side)
#
# Purpose:
# - Local OKEX/Bybit market-data fan-out:
#   - dat_pbs/okex-* -> bridge/okex-*
#   - dat_pbs/bybit-* -> bridge/bybit-*
# - Remote Binance market-data ingest from JP via ZMQ: ZMQ -> bridge/binance-futures/*
# - Remote Binance business channels to JP engine/account_monitor over ZMQ
#   - order_reqs/binance <-> order_resps/binance
#   - query_reqs/binance <-> query_resps/binance
#   - account_pubs/binance_pm (JP -> HK)
#
# NOTE:
# - Endpoints starting with `dat_pbs/` or `bridge/` are GLOBAL (not namespaced).
# - Endpoints like `order_reqs/*`, `query_reqs/*`, `account_pubs/*` are NAMESPACED via IPC_NAMESPACE.
# - This concrete template is intended for:
#   IPC_NAMESPACE=okex_binance_xarb_trade01
#   Do not rewrite endpoint names to include the namespace manually.

routes:
  # -----------------------------
  # Local OKEX/Bybit market-data fan-out
  # -----------------------------
  - id: bridge_okex_margin_ask_bid
    from:
      type: ipc
      endpoint: "dat_pbs/okex-margin/ask_bid_spread"
      size: 128
    to:
      type: ipc
      endpoint: "bridge/okex-margin/ask_bid_spread"
      size: 128
      max_publishers: 1
      max_subscribers: 64
      history_size: 100
      subscriber_max_buffer_size: 8192

  - id: bridge_okex_margin_derivatives
    from:
      type: ipc
      endpoint: "dat_pbs/okex-margin/derivatives"
      size: 128
    to:
      type: ipc
      endpoint: "bridge/okex-margin/derivatives"
      size: 128
      max_publishers: 1
      max_subscribers: 64
      history_size: 50
      subscriber_max_buffer_size: 8192

  - id: bridge_okex_futures_ask_bid
    from:
      type: ipc
      endpoint: "dat_pbs/okex-futures/ask_bid_spread"
      size: 128
    to:
      type: ipc
      endpoint: "bridge/okex-futures/ask_bid_spread"
      size: 128
      max_publishers: 1
      max_subscribers: 64
      history_size: 100
      subscriber_max_buffer_size: 8192

  - id: bridge_okex_futures_derivatives
    from:
      type: ipc
      endpoint: "dat_pbs/okex-futures/derivatives"
      size: 128
    to:
      type: ipc
      endpoint: "bridge/okex-futures/derivatives"
      size: 128
      max_publishers: 1
      max_subscribers: 64
      history_size: 50
      subscriber_max_buffer_size: 8192

  - id: bridge_bybit_margin_ask_bid
    from:
      type: ipc
      endpoint: "dat_pbs/bybit-margin/ask_bid_spread"
      size: 128
    to:
      type: ipc
      endpoint: "bridge/bybit-margin/ask_bid_spread"
      size: 128
      max_publishers: 1
      max_subscribers: 64
      history_size: 100
      subscriber_max_buffer_size: 8192

  - id: bridge_bybit_margin_derivatives
    from:
      type: ipc
      endpoint: "dat_pbs/bybit-margin/derivatives"
      size: 128
    to:
      type: ipc
      endpoint: "bridge/bybit-margin/derivatives"
      size: 128
      max_publishers: 1
      max_subscribers: 64
      history_size: 50
      subscriber_max_buffer_size: 8192

  - id: bridge_bybit_futures_ask_bid
    from:
      type: ipc
      endpoint: "dat_pbs/bybit-futures/ask_bid_spread"
      size: 128
    to:
      type: ipc
      endpoint: "bridge/bybit-futures/ask_bid_spread"
      size: 128
      max_publishers: 1
      max_subscribers: 64
      history_size: 100
      subscriber_max_buffer_size: 8192

  - id: bridge_bybit_futures_derivatives
    from:
      type: ipc
      endpoint: "dat_pbs/bybit-futures/derivatives"
      size: 128
    to:
      type: ipc
      endpoint: "bridge/bybit-futures/derivatives"
      size: 128
      max_publishers: 1
      max_subscribers: 64
      history_size: 50
      subscriber_max_buffer_size: 8192

  # ----------------------------------------
  # Remote Binance market-data ingest from JP
  # ----------------------------------------
  #
  # JP bridge should PUSH to HK:6360 for these routes.
  # Multiple routes can share the same bind address; route id is used as ZMQ header.
  - id: xarb_bn_mkt_ask_bid_from_jp
    from:
      type: zmq
      endpoint: "tcp://0.0.0.0:6360"
      size: 128
    to:
      type: ipc
      endpoint: "bridge/binance-futures/ask_bid_spread"
      size: 128
      max_publishers: 1
      max_subscribers: 64
      history_size: 100
      subscriber_max_buffer_size: 8192

  - id: xarb_bn_mkt_derivatives_from_jp
    from:
      type: zmq
      endpoint: "tcp://0.0.0.0:6360"
      size: 128
    to:
      type: ipc
      endpoint: "bridge/binance-futures/derivatives"
      size: 128
      max_publishers: 1
      max_subscribers: 64
      history_size: 50
      subscriber_max_buffer_size: 8192

  # ---------------------------------------------------
  # Binance business channels: HK pre_trade <-> JP side
  # ---------------------------------------------------
  #
  # HK -> JP: order request
  - id: xarb_bn_order_req_to_jp
    from:
      type: ipc
      endpoint: "order_reqs/binance"
      size: 4096
    to:
      type: zmq
      endpoint: "tcp://54.64.147.69:6361"
      size: 4096

  # JP -> HK: order response
  - id: xarb_bn_order_resp_from_jp
    from:
      type: zmq
      endpoint: "tcp://0.0.0.0:6362"
      size: 64
    to:
      type: ipc
      endpoint: "order_resps/binance"
      size: 64

  # HK -> JP: query request
  - id: xarb_bn_query_req_to_jp
    from:
      type: ipc
      endpoint: "query_reqs/binance"
      size: 256
    to:
      type: zmq
      endpoint: "tcp://54.64.147.69:6363"
      size: 256

  # JP -> HK: query response
  - id: xarb_bn_query_resp_from_jp
    from:
      type: zmq
      endpoint: "tcp://0.0.0.0:6364"
      size: 4096
    to:
      type: ipc
      endpoint: "query_resps/binance"
      size: 4096

  # JP -> HK: Binance account monitor stream
  - id: xarb_bn_account_pub_from_jp
    from:
      type: zmq
      endpoint: "tcp://0.0.0.0:6365"
      size: 16384
    to:
      type: ipc
      endpoint: "account_pubs/binance_pm"
      size: 16384
      max_publishers: 1
      max_subscribers: 4
      history_size: 2048
      subscriber_max_buffer_size: 1024
