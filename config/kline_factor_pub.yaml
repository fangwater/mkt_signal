# 因子发布统一配置（基于 kline）

data_source:
  kline_channel: "kline5s"

runtime:
  reload_every: 12
  max_keep_count: 900

factors:
  rl_return_volatility:
    enabled: true
    pct_change_period: 12
    rolling_window: 30
    scale_factor: 1.3
    clip:
      min: 0.0003
      max: 0.005

  hf_vol_std:
    enabled: true
    window: 360
    scale_factor: 1.0

  hf_highlow_range:
    enabled: true
    window: 360
    scale_factor: 1.0

  hf_spread_return:
    enabled: true
    return_period: 18
    ma_window: 30
    scale_factor: 1.0

  hf_count_mean:
    enabled: true
    window: 360
    scale_factor: 1.0

  hf_vol_abs_pct_by_vol:
    enabled: true
    window: 5
    scale_factor: 1.0

  hf_volume_mean:
    enabled: true
    window: 360
    scale_factor: 1.0

  hf_price_volume_corr:
    enabled: true
    window: 360
    scale_factor: 1.0

  hf_vol_volume_combined:
    enabled: true
    vol_window: 360
    volu_window: 360
    scale_factor: 1.0
