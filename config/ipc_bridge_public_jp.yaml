# Standalone public bridge config (JP side).
#
# Responsibilities:
# - Local market-data fan-out:
#     dat_pbs/binance-futures/* -> bridge/binance-futures/*
#     dat_pbs/binance-margin/* -> bridge/binance-margin/*
#     dat_pbs/gate-margin/* -> bridge/gate-margin/*
#     dat_pbs/gate-futures/* -> bridge/gate-futures/*
#     dat_pbs/bitget-margin/* -> bridge/bitget-margin/*
#     dat_pbs/bitget-futures/* -> bridge/bitget-futures/*
# - JP -> HK public forwarding over one shared ZMQ port:
#     bridge/binance-futures/{ask_bid_spread,derivatives}
#     bridge/binance-futures/incremental (currently commented out)
#     factor_pub/binance-futures/rl_vol
#     model_output/binance_futures_direction_model
#
# Notes:
# - This config is intentionally public/global only; it does not use IPC_NAMESPACE.
# - The cross-host route ids must exactly match the HK config.
# - Update the HK public bridge IP below if the deployment host changes.

routes:
  # --------------------------------
  # Local Binance futures market fan-out
  # --------------------------------
  # - id: public_local_binance_futures_incremental
  #   from:
  #     type: ipc 
  #     endpoint: "dat_pbs/binance-futures/incremental" 
  #     size: 2048 
  #   to: 
  #     type: ipc 
  #     endpoint: "bridge/binance-futures/incremental"
  #     size: 2048 
  #     max_publishers: 1 
  #     max_subscribers: 64
  #     history_size: 100
  #     subscriber_max_buffer_size: 8192

  - id: public_local_binance_futures_ask_bid
    from:
      type: ipc
      endpoint: "dat_pbs/binance-futures/ask_bid_spread"
      size: 128 
    to:
      type: ipc
      endpoint: "bridge/binance-futures/ask_bid_spread"
      size: 128 
      max_publishers: 1 
      max_subscribers: 64 
      history_size: 100 
      subscriber_max_buffer_size: 8192

  - id: public_local_binance_futures_derivatives
    from:
      type: ipc
      endpoint: "dat_pbs/binance-futures/derivatives"
      size: 128
    to:
      type: ipc
      endpoint: "bridge/binance-futures/derivatives"
      size: 128
      max_publishers: 1
      max_subscribers: 64
      history_size: 50
      subscriber_max_buffer_size: 8192

  - id: public_local_binance_margin_ask_bid
    from:
      type: ipc
      endpoint: "dat_pbs/binance-margin/ask_bid_spread"
      size: 128
    to:
      type: ipc
      endpoint: "bridge/binance-margin/ask_bid_spread"
      size: 128
      max_publishers: 1
      max_subscribers: 64
      history_size: 100
      subscriber_max_buffer_size: 8192

  - id: public_local_gate_margin_ask_bid
    from:
      type: ipc
      endpoint: "dat_pbs/gate-margin/ask_bid_spread"
      size: 128
    to:
      type: ipc
      endpoint: "bridge/gate-margin/ask_bid_spread"
      size: 128
      max_publishers: 1
      max_subscribers: 64
      history_size: 100
      subscriber_max_buffer_size: 8192

  - id: public_local_gate_margin_derivatives
    from:
      type: ipc
      endpoint: "dat_pbs/gate-margin/derivatives"
      size: 128
    to:
      type: ipc
      endpoint: "bridge/gate-margin/derivatives"
      size: 128
      max_publishers: 1
      max_subscribers: 64
      history_size: 50
      subscriber_max_buffer_size: 8192

  - id: public_local_gate_futures_ask_bid
    from:
      type: ipc
      endpoint: "dat_pbs/gate-futures/ask_bid_spread"
      size: 128
    to:
      type: ipc
      endpoint: "bridge/gate-futures/ask_bid_spread"
      size: 128
      max_publishers: 1
      max_subscribers: 64
      history_size: 100
      subscriber_max_buffer_size: 8192

  - id: public_local_gate_futures_derivatives
    from:
      type: ipc
      endpoint: "dat_pbs/gate-futures/derivatives"
      size: 128
    to:
      type: ipc
      endpoint: "bridge/gate-futures/derivatives"
      size: 128
      max_publishers: 1
      max_subscribers: 64
      history_size: 50
      subscriber_max_buffer_size: 8192

  - id: public_local_bitget_margin_ask_bid
    from:
      type: ipc
      endpoint: "dat_pbs/bitget-margin/ask_bid_spread"
      size: 128
    to:
      type: ipc
      endpoint: "bridge/bitget-margin/ask_bid_spread"
      size: 128
      max_publishers: 1
      max_subscribers: 64
      history_size: 100
      subscriber_max_buffer_size: 8192

  - id: public_local_bitget_margin_derivatives
    from:
      type: ipc
      endpoint: "dat_pbs/bitget-margin/derivatives"
      size: 128
    to:
      type: ipc
      endpoint: "bridge/bitget-margin/derivatives"
      size: 128
      max_publishers: 1
      max_subscribers: 64
      history_size: 50
      subscriber_max_buffer_size: 8192

  - id: public_local_bitget_futures_ask_bid
    from:
      type: ipc
      endpoint: "dat_pbs/bitget-futures/ask_bid_spread"
      size: 128
    to:
      type: ipc
      endpoint: "bridge/bitget-futures/ask_bid_spread"
      size: 128
      max_publishers: 1
      max_subscribers: 64
      history_size: 100
      subscriber_max_buffer_size: 8192

  - id: public_local_bitget_futures_derivatives
    from:
      type: ipc
      endpoint: "dat_pbs/bitget-futures/derivatives"
      size: 128
    to:
      type: ipc
      endpoint: "bridge/bitget-futures/derivatives"
      size: 128
      max_publishers: 1
      max_subscribers: 64
      history_size: 50
      subscriber_max_buffer_size: 8192

  # ------------------------------------
  # JP -> HK public forwarding
  # ------------------------------------
  #
  # All public streams share the same ZMQ port.
  # The route id is used as the ZMQ header and must match the HK config.
  # - id: public_binance_futures_incremental
  #   from:
  #     type: ipc
  #     endpoint: "bridge/binance-futures/incremental"
  #     size: 2048
  #     max_publishers: 1
  #     max_subscribers: 64
  #     history_size: 100
  #     subscriber_max_buffer_size: 8192
  #   to:
  #     type: zmq
  #     endpoint: "tcp://47.238.128.48:6360"
  #     size: 2048

  - id: public_binance_futures_ask_bid
    from:
      type: ipc
      endpoint: "bridge/binance-futures/ask_bid_spread"
      size: 128
      max_publishers: 1
      max_subscribers: 64
      history_size: 100
      subscriber_max_buffer_size: 8192
    to:
      type: zmq
      endpoint: "tcp://47.238.128.48:6360"
      size: 128

  - id: public_binance_futures_derivatives
    from:
      type: ipc
      endpoint: "bridge/binance-futures/derivatives"
      size: 128
      max_publishers: 1
      max_subscribers: 64
      history_size: 50
      subscriber_max_buffer_size: 8192
    to:
      type: zmq
      endpoint: "tcp://47.238.128.48:6360"
      size: 128

  - id: public_binance_futures_rl_return_volatility
    from:
      type: ipc
      endpoint: "factor_pub/binance-futures/rl_vol"
      size: 256
    to:
      type: zmq
      endpoint: "tcp://47.238.128.48:6360"
      size: 256

  - id: public_binance_futures_direction_model_output
    from:
      type: ipc
      endpoint: "model_output/binance_futures_direction_model"
      size: 2048
      max_publishers: 1
      max_subscribers: 10
      history_size: 128
      subscriber_max_buffer_size: 256
    to:
      type: zmq
      endpoint: "tcp://47.238.128.48:6360"
      size: 2048
