# Fusion factor 发布配置

# 从 tlen_config_server 的 amount_thresholds 拉 symbol 列表
[tlen_server]
base_url = "http://127.0.0.1:6322"
request_timeout_ms = 5000
symbol_reload_secs = 180

# 可选: 配置后进入 fusion+rl 模式。
# 启动/刷新 symbol 时会按当前 symbol 集合从 model_manager 拉取有序 factor 列表，
# 并发送 fusion FeatureMsg；删除该段，或保留该段但将 model_name 置空时，进入 rl_only 模式，
# 仅发布 rl_return_volatility。
[model_manager]
base_url = "http://127.0.0.1:6300"
model_name = "binance-futures-mm-xgb-test"
request_timeout_ms = 5000

[rl_factor]
# 保留历史单因子输出: factor_pub/{venue}/rl_return_volatility
pct_change_period = 12
rolling_window = 30
scale_factor = 1.3

[rl_factor.clip]
min = 0.0005
max = 0.005
