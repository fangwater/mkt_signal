# Fusion factor 发布配置

# 从 tlen_config_server 的 factor_plan 拉 symbol + ordered factors。
# output service 固定为 fusion_factor/{venue}，例如 venue=binance-futures ->
# fusion_factor/binance-futures
[tlen_server]
base_url = "http://127.0.0.1:6322"
request_timeout_ms = 5000
symbol_reload_secs = 180

[rl_factor]
# 保留历史单因子输出: factor_pub/{venue}/rl_return_volatility
pct_change_period = 12
rolling_window = 30
scale_factor = 1.3

[rl_factor.clip]
min = 0.0005
max = 0.005
