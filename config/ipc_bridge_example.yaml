# Example configuration for ipc_bridge.
#
# Each route directly describes its source and destination endpoint:
# - `type: ipc` uses an IceOryx service name
# - `type: zmq` uses a full ZMQ address
#
# Iceoryx service names are namespaced via IPC_NAMESPACE unless they start with
# `dat_pbs/` or `bridge/`.
#
# Supported sizes: 64, 128, 256, 512, 1024, 2048, 4096, 8192, 16384.

routes:
  # Pre-trade -> trade_engine order requests (ipc -> zmq)
  - id: order_req_binance
    from:
      type: ipc
      endpoint: "order_reqs/binance"
      size: 4096
    to:
      type: zmq
      endpoint: "tcp://10.0.2.10:5555"
      size: 4096

  # trade_engine -> pre-trade order responses (zmq -> ipc)
  - id: order_resp_binance
    from:
      type: zmq
      endpoint: "tcp://0.0.0.0:5555"
      size: 64
    to:
      type: ipc
      endpoint: "order_resps/binance"
      size: 64

  # Local market-data fan-out (ipc -> ipc)
  - id: bridge_binance_futures_ask_bid
    from:
      type: ipc
      endpoint: "dat_pbs/binance-futures/ask_bid_spread"
      size: 128
    to:
      type: ipc
      endpoint: "bridge/binance-futures/ask_bid_spread"
      size: 128
      max_publishers: 1
      max_subscribers: 64
      history_size: 100
      subscriber_max_buffer_size: 8192
