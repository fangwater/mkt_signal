model_manager_base_url = "http://127.0.0.1:6300"
model_manager_request_timeout_ms = 120000

# Optional auth settings for model_manager.
# Keep empty when auth is disabled.
model_manager_password = ""
model_manager_bearer_token = ""
model_binary_path = "/api/models/{model_name}/model_so/{symbol}"
model_binary_feature_dim_header = "x-model-feature-dim"
model_binary_cache_dir = "/tmp/mkt_signal_model_pub"

# {model_name} is substituted from CLI argument at runtime.
input_service = "fusion_factor/{model_name}"
output_service = "model_output/{model_name}"

# Z-score normalization (rolling Welford)
window_size = 17280       # 24h / 5s
min_samples = 1000        # cold-start: suppress publishing until this many samples per symbol
zscore_cap = 3.0          # clip to [-k*std, k*std] before z-score
