<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>FR Signal 看板</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", "PingFang SC", "Helvetica Neue", sans-serif;
        --bg: #0d1117;
        --bg-soft: #161b22;
        --bg-alt: #0f1520;
        --border: #30363d;
        --text: #e6edf3;
        --muted: #8b949e;
        --accent-green: #3fb950;
        --accent-red: #f85149;
        --accent-blue: #58a6ff;
        --accent-yellow: #d29922;
        --accent-gray: #8b949e;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 16px 24px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-soft);
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }
      header h1 { margin: 0; font-size: 20px; }
      .status { display: flex; gap: 12px; align-items: center; font-size: 14px; color: var(--muted); }
      .status span.indicator {
        width: 10px; height: 10px; border-radius: 999px; display: inline-block; margin-right: 6px;
      }
      .indicator.ok { background: var(--accent-green); }
      .indicator.err { background: var(--accent-red); }
      .indicator.warn { background: #d29922; }
      .controls { margin-left: auto; display: flex; gap: 12px; align-items: center; }
      .controls input {
        padding: 6px 10px; background: var(--bg); color: var(--text);
        border: 1px solid var(--border); border-radius: 6px; min-width: 180px;
      }
      .controls button {
        padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px;
        background: transparent; color: var(--text); cursor: pointer;
      }
      .controls button:hover { border-color: var(--text); }
      main { flex: 1; overflow: auto; padding: 0 24px 24px; }
      table { width: 100%; border-collapse: collapse; margin-top: 16px; }
      thead { background: var(--bg-soft); position: sticky; top: 0; z-index: 1; }
      th, td {
        padding: 8px 10px; text-align: right; border-bottom: 1px solid var(--border);
        font-variant-numeric: tabular-nums;
      }
      th:first-child, td:first-child { text-align: left; }
      tbody tr:nth-child(even) { background: var(--bg-alt); }
      tbody tr:hover { background: rgba(88, 166, 255, 0.06); }
      tr.triggered { border-left: 3px solid var(--accent-green); }
      tr.triggered.negative { border-left-color: var(--accent-red); }
      .muted { color: var(--muted); }
      .empty { padding: 80px 0; text-align: center; color: var(--muted); }

      .symbol { font-weight: 600; letter-spacing: 0.2px; }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 70px;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        text-transform: none;
        border: 1px solid transparent;
      }
      .badge.none { color: var(--muted); background: transparent; border-color: var(--border); }
      .badge.fwd-open { color: var(--accent-green); background: rgba(63, 185, 80, 0.15); border-color: rgba(63, 185, 80, 0.35); }
      .badge.bwd-open { color: var(--accent-red); background: rgba(248, 81, 73, 0.15); border-color: rgba(248, 81, 73, 0.35); }
      .badge.fwd-close { color: var(--accent-blue); background: rgba(88, 166, 255, 0.12); border-color: rgba(88, 166, 255, 0.32); }
      .badge.bwd-close { color: #ff7b72; background: rgba(255, 123, 114, 0.12); border-color: rgba(255, 123, 114, 0.32); }
      .badge.fwd-cancel { color: var(--accent-yellow); background: rgba(210, 153, 34, 0.12); border-color: rgba(210, 153, 34, 0.32); }
      .badge.bwd-cancel { color: #ffa657; background: rgba(255, 166, 87, 0.12); border-color: rgba(255, 166, 87, 0.32); }

      .num { display: inline-block; min-width: 60px; text-align: right; }
      .num.pos { color: var(--accent-green); }
      .num.neg { color: var(--accent-red); }
      .num.na { color: var(--muted); }
      @media (max-width: 960px) {
        header { flex-direction: column; align-items: flex-start; }
        .controls { margin-left: 0; }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>FR Signal 状态</h1>
      <div class="status">
        <span class="indicator warn" id="ws-indicator"></span>
        <span id="ws-status">等待连接…</span>
        <span id="last-update">最后刷新：-</span>
      </div>
      <div class="controls">
        <input id="filter-input" placeholder="按 Symbol 过滤 (模糊匹配)" />
        <button id="reload-btn" title="强制重连 WebSocket">重连</button>
      </div>
    </header>
    <main>
      <table>
        <thead>
          <tr>
            <th>Symbol</th>
            <th>预测FR%</th>
            <th>FR_MA%</th>
            <th>PredLoan%</th>
            <th>CurLoan%</th>
            <th>FR+PLoan%</th>
            <th>MA+CLoan%</th>
            <th>FR Sig</th>
            <th>Spread Sig</th>
            <th>阈值</th>
            <th>使用值</th>
            <th>SpreadType</th>
            <th>CompareOp</th>
            <th>BidAsk</th>
            <th>AskBid</th>
            <th>SpreadRate</th>
            <th>Final Sig</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="17" class="empty">暂无数据</td></tr>
        </tbody>
      </table>
    </main>
    <script>
      const filterInput = document.getElementById("filter-input");
      const reloadBtn = document.getElementById("reload-btn");
      const wsIndicator = document.getElementById("ws-indicator");
      const wsStatus = document.getElementById("ws-status");
      const lastUpdate = document.getElementById("last-update");
      const tbody = document.getElementById("tbody");
      const headerTitle = document.querySelector("header h1");

      const state = {
        ws: null,
        reconnectTimer: null,
        data: new Map(),
        lastTsUs: null,
      };
      const RECONNECT_MS = 2000;

      function defaultWsUrl() {
        const scheme = location.protocol === "https:" ? "wss" : "ws";
        return `${scheme}://${location.host}/ws`;
      }
      const qs = new URLSearchParams(location.search);
      const WS_URL = qs.get("ws") || defaultWsUrl();

      // 显示当前 exchange（来自 query 或 path）
      let exchange = qs.get("exchange");
      if (!exchange) {
        const m = location.pathname.match(/fr_signal\\/([^/?#]+)/i);
        if (m) exchange = m[1];
      }
      if (exchange) {
        const exUpper = exchange.toUpperCase();
        if (headerTitle) headerTitle.textContent = `FR Signal 状态 - ${exUpper}`;
        document.title = `FR Signal 看板 - ${exUpper}`;
      }
      const expectedExchange = exchange ? exchange.toLowerCase() : null;

      function setStatus(level, text) {
        wsIndicator.className = `indicator ${level}`;
        wsStatus.textContent = text;
      }

      function fmtPct(v) {
        if (v === null || v === undefined || !Number.isFinite(v)) return "-";
        return v.toFixed(3);
      }
      function fmtRate(v) {
        if (v === null || v === undefined || !Number.isFinite(v)) return "-";
        return v.toFixed(6);
      }

      function numClass(v) {
        if (v === null || v === undefined || !Number.isFinite(v)) return "na";
        if (v > 0) return "pos";
        if (v < 0) return "neg";
        return "";
      }

      function renderNum(v, fmtFn) {
        const cls = numClass(v);
        const text = fmtFn(v);
        return `<span class="num ${cls}">${text}</span>`;
      }

      function sigClass(sig) {
        switch (sig) {
          case "FwdOpen": return "fwd-open";
          case "BwdOpen": return "bwd-open";
          case "FwdClose": return "fwd-close";
          case "BwdClose": return "bwd-close";
          case "FwdCancel": return "fwd-cancel";
          case "BwdCancel": return "bwd-cancel";
          default: return "none";
        }
      }

      function renderSig(sig) {
        const s = sig && sig !== "-" ? sig : "-";
        const cls = sigClass(s);
        return `<span class="badge ${cls}">${s}</span>`;
      }

      function render() {
        const q = filterInput.value.trim().toUpperCase();
        const entries = Array.from(state.data.values()).filter(e => {
          if (!q) return true;
          return (e.symbol || "").toUpperCase().includes(q);
        }).sort((a, b) => (a.symbol || "").localeCompare(b.symbol || ""));

        tbody.innerHTML = "";
        if (!entries.length) {
          const tr = document.createElement("tr");
          const td = document.createElement("td");
          td.colSpan = 17;
          td.className = "empty";
          td.textContent = "暂无数据";
          tr.appendChild(td);
          tbody.appendChild(tr);
          return;
        }

        for (const e of entries) {
          const tr = document.createElement("tr");
          const finalSig = e.final_sig || "-";
          if (finalSig !== "-") {
            tr.classList.add("triggered");
            if (finalSig.startsWith("Bwd")) tr.classList.add("negative");
          }

          tr.innerHTML = `
            <td class="symbol">${e.symbol || "-"}</td>
            <td>${renderNum(e.pred_fr_pct, fmtPct)}</td>
            <td>${renderNum(e.fr_ma_pct, fmtPct)}</td>
            <td>${renderNum(e.pred_loan_pct, fmtPct)}</td>
            <td>${renderNum(e.cur_loan_pct, fmtPct)}</td>
            <td>${renderNum(e.fr_plus_pred_loan_pct, fmtPct)}</td>
            <td>${renderNum(e.ma_plus_cur_loan_pct, fmtPct)}</td>
            <td>${renderSig(e.fr_sig)}</td>
            <td>${renderSig(e.spread_sig)}</td>
            <td>${renderNum(e.spread_threshold, fmtRate)}</td>
            <td>${renderNum(e.spread_used_value, fmtRate)}</td>
            <td class="muted">${e.spread_type || "-"}</td>
            <td class="muted">${e.spread_compare_op || "-"}</td>
            <td>${renderNum(e.spread_bidask, fmtRate)}</td>
            <td>${renderNum(e.spread_askbid, fmtRate)}</td>
            <td>${renderNum(e.spread_rate, fmtRate)}</td>
            <td>${renderSig(finalSig)}</td>
          `;
          tbody.appendChild(tr);
        }
      }

      function handleMessage(ev) {
        let payload;
        try {
          payload = JSON.parse(ev.data);
        } catch (err) {
          console.warn("无法解析消息", err);
          return;
        }
        if (!payload || !Array.isArray(payload.entries)) return;
        if (expectedExchange && payload.exchange && payload.exchange.toLowerCase() !== expectedExchange) {
          return;
        }

        state.data.clear();
        for (const entry of payload.entries) {
          if (entry && entry.symbol) {
            state.data.set(entry.symbol.toUpperCase(), entry);
          }
        }
        state.lastTsUs = payload.ts_us || null;
        if (state.lastTsUs) {
          lastUpdate.textContent = `最后刷新：${new Date(state.lastTsUs / 1000).toLocaleString()}`;
        }
        render();
      }

      function connect() {
        if (state.ws) {
          state.ws.close();
          state.ws = null;
        }
        setStatus("warn", "连接中…");
        try {
          const ws = new WebSocket(WS_URL);
          state.ws = ws;
          ws.addEventListener("open", () => {
            setStatus("ok", "已连接");
            if (state.reconnectTimer) {
              clearTimeout(state.reconnectTimer);
              state.reconnectTimer = null;
            }
          });
          ws.addEventListener("message", handleMessage);
          ws.addEventListener("close", () => {
            setStatus("warn", "连接断开，准备重试…");
            scheduleReconnect();
          });
          ws.addEventListener("error", (err) => {
            console.error("WS 错误", err);
            setStatus("err", "连接异常");
            ws.close();
          });
        } catch (err) {
          console.error("创建 WS 失败", err);
          setStatus("err", "创建连接失败");
          scheduleReconnect();
        }
      }

      function scheduleReconnect() {
        if (state.reconnectTimer) return;
        state.reconnectTimer = setTimeout(() => {
          state.reconnectTimer = null;
          connect();
        }, RECONNECT_MS);
      }

      filterInput.addEventListener("input", render);
      reloadBtn.addEventListener("click", connect);

      connect();
    </script>
  </body>
</html>
